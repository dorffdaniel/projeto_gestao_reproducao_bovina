<div class="conteudo">
    <div class="conteudo-cards">

        <div class="card-informacao">
            <h1>ReproMT</h1>
            <h2>Mais controle. <span>Menos planilhas</span></h2>
            <p>Gestão reprodutiva simplificada.</p>
        </div>

        <div class="card card-login">

            <form (ngSubmit)="login()">
                <div class="mb-3 conteudo-inputs">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" placeholder="Digite seu e-mail cadastrado"
                        [(ngModel)]="Formlogin.email" name="email">
                </div>

                <div class="mb-3 conteudo-inputs">
                    <label for="senha" class="form-label">Senha</label>
                    <div class="conteudo-olho">
                        <input class="form-control" [type]="mostrarSenha ? 'text': 'password'" id="senha"
                            [(ngModel)]="Formlogin.password" name="password" placeholder="Digite sua senha cadastrada"
                            (focus)="aFocar()" (blur)="saiuFoco()" />

                        @if(mostrarIconeOlho()){
                        <i class="fas olho" (mousedown)="$event.preventDefault()" (click)="ativarCampo()"
                            [class.fa-eye-slash]="mostrarSenha" [class.fa-eye]="!mostrarSenha"></i>
                        }

                    </div>

                    <p class="desc-senha">No minimo 8 caracteres, combinando letras, números e simbolos.</p>
                </div>

                <div class="row">
                    <div class="col-6">
                        <a href="#" class="esqueceu-senha">Esqueceu a senha ?</a>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary">Entrar</button>

            </form>

            <div class="row">
                <div class="col-12">
                    <div class="conteudo-registrar">
                        <p>Não tem uma conta ? <a href="#">Registrar</a></p>
                    </div>
                </div>
            </div>

            @if(msgErro()){
            <p class="msgErr">{{msgErro()}}</p>
            }


        </div>

        @if(isLoading()){
        <div class="loading-overlay">
            <div class="spinner-border text-primary spinner-loading" role="status">
                <span class="visually-hidden">Carregando...</span>
            </div>
        </div>
        }

    </div>
</div>
