<div class="conteudo">
    <div class="row">
        <div class="col-12">
            <div class="conteudo-voltar">
                <div class="d-flex align-items-center mb-3">
                    <button class="btn btn-outline-secondary me-2" (click)="voltar()">
                        <i class="fa-solid fa-arrow-left"></i>
                    </button>

                    <h2 class="m-0">Detalhe da Fazenda</h2>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="row g-3 conteudo-inputs">

                <form>
                    <div class="row">
                        <div class="col-md-6">

                            <div class="mb-3">
                                <label class="form-label">Fazenda</label>
                                <input class="form-control" [(ngModel)]="fazenda().nome" [disabled]="ativado" name="nome">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Proprietário</label>
                                <input class="form-control" [(ngModel)]="fazenda().proprietario" [disabled]="ativado" name="proprietario">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Telefone</label>
                                <input class="form-control" [(ngModel)]="fazenda().telefone" [disabled]="ativado" name="telefone">
                            </div>

                        </div>

                        <div class="col-md-6">

                            <div class="mb-3">
                                <label class="form-label">Cidade</label>
                                <input class="form-control" [(ngModel)]="fazenda().cidade" [disabled]="ativado" name="cidade">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Estado</label>
                                <input class="form-control" [(ngModel)]="fazenda().estado" [disabled]="ativado" name="estado">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Tipo de Controle</label>
                                <input class="form-control" [(ngModel)]="fazenda().tipo_controle" [disabled]="ativado" name="tipo_controle">
                            </div>

                        </div>

                    </div>

                </form>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-12">
            <div class="conteudo-botoes">
                @if(isOpen){
                <button class="btn btn-warning" (click)="editarDadosFazenda()">Editar</button>
                <button class="btn btn-danger" (click)="abrirModal()">Apagar</button>
                }

                @if(!isOpen){
                <button class="btn btn-primary" (click)="salvarEditDadosFazenda()">Salvar</button>
                <button class="btn btn-danger" (click)="cancelarEditFazenda()">Cancelar</button>
                }
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-12">
            <div class="conteudo-lote">
                <h2>Lotes</h2>

                <div class="cont-botao">
                    <button class="btn btn-primary" (click)="abrirFormCadastrarLote()">Cadastrar</button>
                </div>

                @if(mostrarFormLote()){
                <div class="cont-formulario">
                    <form>

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label for="nome" class="form-label">Nome do lote</label>
                                <input type="text" class="form-control" id="nome">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label for="categoria" class="form-label">Categoria</label>
                                <select class="form-select" id="categoria">
                                    <option selected disabled>Selecione...</option>
                                    <option value="novilhas">Novilhas</option>
                                    <option value="primiparas">Primíparas</option>
                                    <option value="secundiparas">Secundíparas</option>
                                    <option value="multiparas">Multíparas</option>
                                </select>
                            </div>

                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="animais" class="form-label">Quantidade de animais</label>
                                <input type="number" class="form-control" id="animais" min="1">
                            </div>

                        </div>

                        <div class="mb-3">
                            <label for="observ" class="form-label">Observações</label>
                            <textarea class="form-control" id="observ" rows="3"></textarea>
                        </div>

                        <div class="d-flex justify-content-end mt-4 gap-4">
                            <button class="btn btn-success">Salvar</button>
                            <button class="btn btn-danger" (click)="fecharFormCadastrarLote()">Cancelar</button>
                        </div>

                    </form>

                </div>
                }


            </div>


        </div>
    </div>



    @if (mostrarModal) {
    <div class="modal-backdrop">
        <div class="modal-box">

            <p>Tem certeza que deseja apagar esta fazenda?</p>
            <p>{{fazenda().nome}}</p>

            <div class="conteudo-botoes-modal">
                <button class="btn btn-secondary" (click)="fecharModal()">Cancelar</button>
                <button class="btn btn-danger" (click)="apagarFazenda()">Apagar</button>
            </div>
        </div>
    </div>
    }


</div>
