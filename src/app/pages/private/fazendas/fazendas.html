<div class="conteudo">
    <div class="row">
        <div class="col-12">
            <div class="conteudo-botao-criar-fazenda">
                <button class="btn btn-primary">+ nova fazenda</button>
            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-12">
            <div class="conteudo-tabela">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th scope="col">Fazenda</th>
                            <th scope="col">Proprietario</th>
                            <th scope="col">Cidade</th>
                            <th scope="col">Tipo Controle</th>
                            <th scope="col">Acoes</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            @for(faz of fazendas(); track faz.id){
                            <td>{{faz.nome}}</td>
                            <td>{{faz.proprietario}}</td>
                            <td>{{faz.cidade}}</td>
                            <td>{{faz.estado}}</td>
                            <td class="btn-detalhe">
                                <button class="btn btn-sm" (click)="verDetalhe(faz.id)"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                            </td>
                            }
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>
