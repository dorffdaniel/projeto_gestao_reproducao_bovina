<div class="conteudo">
    <div class="row">
        <div class="col-12">
            <div class="conteudo-inputs">

                <div class="mb-3 card-input">
                    <label for="" class="form-label">Fazenda</label>
                    <input type="text" class="form-control" [(ngModel)]="fazenda().nome" [disabled]="ativado">
                </div>

                <div class="mb-3 card-input">
                    <label for="" class="form-label">Proprietario</label>
                    <input type="text" class="form-control" [(ngModel)]="fazenda().proprietario" [disabled]="ativado">
                </div>

                <div class="mb-3 card-input">
                    <label for="" class="form-label">Telefone</label>
                    <input type="text" class="form-control" [(ngModel)]="fazenda().telefone" [disabled]="ativado">
                </div>

                <div class="mb-3 card-input">
                    <label for="" class="form-label">Cotriguaçu</label>
                    <input type="text" class="form-control" [(ngModel)]="fazenda().cidade" [disabled]="ativado">
                </div>

                <div class="mb-3 card-input">
                    <label for="" class="form-label">Estado</label>
                    <input type="text" class="form-control" [(ngModel)]="fazenda().estado" [disabled]="ativado">
                </div>

            </div>
        </div>
    </div>
    <div class="row">
        <div class="col-12">
            <div class="conteudo-botoes">
                @if(isOpen){
                <button class="btn btn-warning" (click)="editarDadosFazenda()">Editar</button>
                <button class="btn btn-danger">Apagar</button>
                }

                @if(!isOpen){
                <button class="btn btn-primary">Salvar</button>
                <button class="btn btn-danger" (click)="cancelarEditFazenda()">Cancelar</button>
                }


            </div>
        </div>
    </div>


</div>
